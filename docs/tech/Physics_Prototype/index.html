<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dungeon Runner — Levels 3 &amp; 4</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0a0a14;display:flex;justify-content:center;align-items:center;min-height:100vh;}
    #gameContainer{position:relative;}
    canvas{display:block;image-rendering:pixelated;}
    #hud{position:absolute;top:8px;left:8px;right:8px;display:flex;justify-content:space-between;pointer-events:none;}
    #cr{background:rgba(0,0,0,0.6);color:#00d4ff;font:bold 16px monospace;padding:4px 10px;border:1px solid #00d4ff44;border-radius:4px;}
    #de{background:rgba(0,0,0,0.6);color:#ff4757;font:bold 14px monospace;padding:4px 10px;border:1px solid #ff475744;border-radius:4px;}
  </style>
</head>
<body>
  <div id="gameContainer">
    <canvas id="gameCanvas" width="800" height="640"></canvas>
    <div id="hud">
      <span id="cr">Crystals: 0 / 12</span>
      <span id="de">Deaths: 0</span>
    </div>
  </div>
  <script src="audio_engine.js"></script>
  <script src="ambient_engine.js"></script>
  <script src="prototype_v13.js"></script>
</body>
</html>
